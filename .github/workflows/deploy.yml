name: Deploy to lornu.ai

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Deploy to lornu.ai infrastructure
        env:
          DEPLOY_KEY: ${{ secrets.LORNU_DEPLOY_KEY }}
          DEPLOY_HOST: ${{ secrets.LORNU_DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H $DEPLOY_HOST >> ~/.ssh/known_hosts 2>/dev/null
          scp -i ~/.ssh/deploy_key -r ./index.html $DEPLOY_HOST:/var/www/lonestarledgers/
